<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Login | Arlind Hyseni CMS</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a 50%, #111827);
            color: #e2e8f0;
        }
        .card {
            width: min(420px, calc(100% - 24px));
            padding: 30px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.14);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
        }
        p { color: #94a3b8; }
        h1 { margin-top: 0; }
        form { display: grid; gap: 12px; }
        label { font-weight: 700; }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.76);
            color: #e2e8f0;
            font: inherit;
        }
        button {
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            color: white;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }
        .error {
            min-height: 24px;
            color: #fda4af;
            font-weight: 700;
        }
        a { color: #67e8f9; text-decoration: none; }
    </style>
</head>
<body>
    <section class="card">
        <p>Secret CMS Access</p>
        <h1>Hyr ne Dashboard</h1>
        <p>Per demo username mbetet `admin`, ndersa password-i vjen nga databaza `profile_settings`.</p>
        <form method="post" action="/login">
            <input id="csrfToken" name="csrf_token" type="hidden">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
            <button type="submit">Hyr</button>
        </form>
        <p class="error">{{ERROR}}</p>
        <a href="/">Kthehu te faqja publike</a>
    </section>
    <script>
        fetch("/api/csrf-token")
            .then((response) => response.json())
            .then((payload) => {
                document.getElementById("csrfToken").value = payload.token;
            })
            .catch(() => {});
    </script>
</body>
</html>
